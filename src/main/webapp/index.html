<!--7a. Build a Session Management using JSP program set with one minute session expiry time to
get your name through text box and press submit to display the message by greeting Hello your
name!. Check the expiry of the session after one minute.  -->
<%@ page language="java" %>
<html>
<head>
    <title>Cookie Management</title>
</head>
<body>
    <h2>Add Cookie</h2>

    <form action="addCookie.jsp" method="post">
        Name: <input type="text" name="cname" required><br><br>
        Domain: <input type="text" name="domain" required><br><br>
        Max Expiry Age (sec): <input type="text" name="age" required><br><br>

        <input type="submit" value="Add Cookie">
    </form>
</body>
</html>
